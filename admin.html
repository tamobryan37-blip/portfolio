<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Messages reçus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#17212B;color:#fff;min-height:100vh;}
.wrap{max-width:760px;margin:0 auto;padding:2rem;}
h1{font-size:1.5rem;margin-bottom:.3rem;}
.sub{color:#708EA4;font-size:.85rem;margin-bottom:2rem;}
.msg-card{background:#1C2733;border:1px solid #232F3D;border-radius:12px;padding:1.2rem;margin-bottom:1rem;}
.msg-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:.6rem;}
.msg-name{font-weight:700;font-size:.95rem;}
.msg-email{color:#2AABEE;font-size:.8rem;}
.msg-date{color:#708EA4;font-size:.72rem;white-space:nowrap;}
.msg-subject{font-size:.8rem;color:#708EA4;margin-bottom:.4rem;font-style:italic;}
.msg-text{font-size:.88rem;line-height:1.6;background:#17212B;padding:.8rem;border-radius:8px;}
.empty{text-align:center;color:#708EA4;padding:3rem 1rem;}
.clear-btn{background:#4A1A1A;border:1px solid #6A2A2A;color:#ff8a8a;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.8rem;margin-top:2rem;}
.clear-btn:hover{background:#6A2A2A;}
.back{color:#2AABEE;text-decoration:none;font-size:.85rem;display:inline-block;margin-bottom:1.5rem;}

/* Login screen */
.login-screen{position:fixed;inset:0;background:#17212B;display:flex;align-items:center;justify-content:center;z-index:100;}
.login-box{background:#1C2733;border:1px solid #232F3D;border-radius:16px;padding:2.5rem 2rem;width:340px;max-width:90vw;text-align:center;}
.login-box .icon{font-size:2.5rem;margin-bottom:1rem;}
.login-box h2{font-size:1.1rem;margin-bottom:.4rem;}
.login-box p{color:#708EA4;font-size:.82rem;margin-bottom:1.5rem;}
.login-input{width:100%;background:#17212B;border:1px solid #232F3D;border-radius:8px;padding:.7rem 1rem;color:#fff;font-size:.9rem;outline:none;margin-bottom:.9rem;font-family:'Inter',sans-serif;text-align:center;}
.login-input:focus{border-color:#2AABEE;}
.login-btn{width:100%;background:#2AABEE;border:none;border-radius:8px;padding:.7rem;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:#1E96D8;}
.login-error{color:#ff8a8a;font-size:.78rem;margin-top:.7rem;display:none;}
.content{display:none;}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="icon">🔒</div>
    <h2>Accès protégé</h2>
    <p>Entre le mot de passe pour voir tes messages</p>
    <input type="password" class="login-input" id="pwdInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkPwd()"/>
    <button class="login-btn" onclick="checkPwd()">Déverrouiller</button>
    <div class="login-error" id="loginError">❌ Mot de passe incorrect</div>
  </div>
</div>

<div class="content" id="content">
  <div class="wrap">
    <a href="index.html" class="back">← Retour au site</a>
    <h1>📬 Messages reçus</h1>
    <p class="sub">Historique sauvegardé localement sur cet appareil/navigateur</p>
    <div id="messages"></div>
    <button class="clear-btn" onclick="clearAll()">🗑️ Effacer tout l'historique</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'fredbryan2026';

function checkPwd(){
  const input = document.getElementById('pwdInput');
  const err = document.getElementById('loginError');
  if(input.value === ADMIN_PASSWORD){
    sessionStorage.setItem('fb_admin_auth','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('content').style.display='block';
    render();
  } else {
    err.style.display='block';
    input.value='';
    input.focus();
  }
}

function render(){
  const history = JSON.parse(localStorage.getItem('fb_messages')||'[]');
  const el = document.getElementById('messages');
  if(history.length===0){
    el.innerHTML = '<div class="empty">Aucun message pour le moment.<br/>Les messages envoyés via le formulaire de contact apparaîtront ici.</div>';
    return;
  }
  el.innerHTML = history.slice().reverse().map(m=>`
    <div class="msg-card">
      <div class="msg-top">
        <div>
          <div class="msg-name">${m.nom}</div>
          <div class="msg-email">${m.email}</div>
        </div>
        <div class="msg-date">${m.date}</div>
      </div>
      ${m.sujet?`<div class="msg-subject">Sujet : ${m.sujet}</div>`:''}
      <div class="msg-text">${m.msg}</div>
    </div>`).join('');
}

function clearAll(){
  if(confirm('Effacer tout l\'historique des messages ?')){
    localStorage.removeItem('fb_messages');
    render();
  }
}

// Si déjà connecté dans cette session, on saute l'écran de login
if(sessionStorage.getItem('fb_admin_auth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('content').style.display='block';
  render();
}
</script>
</body>
</html>
