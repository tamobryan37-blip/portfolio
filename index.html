<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio — Fred Bryan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#17212B;--sidebar:#0E1621;--panel:#1C2733;--hover:#2B3A4A;
  --accent:#2AABEE;--accent2:#1E96D8;--text:#FFFFFF;--sub:#708EA4;
  --border:#232F3D;--bubble-me:#2B5278;--bubble-in:#182533;
  --green:#4DCD5E;--radius:12px;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;height:100vh;width:100vw;}

/* SIDEBAR */
.sidebar{width:320px;min-width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid var(--border);background:var(--sidebar);}
.s-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2AABEE,#1A6FA8);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff;flex-shrink:0;border:2px solid rgba(42,171,238,.4);}
.s-name{font-weight:700;font-size:.95rem;letter-spacing:-.01em;}
.s-handle{font-size:.72rem;color:var(--accent);margin-top:.1rem;}
.s-status{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--sub);margin-top:.2rem;}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.search-wrap{position:relative;margin:.7rem 1rem;}
.search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--sub);}
.search-wrap input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:.5rem .9rem .5rem 2.2rem;color:var(--text);font-size:.82rem;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--sub);}
.chat-list{flex:1;overflow-y:auto;}
.chat-item{display:flex;align-items:center;gap:.9rem;padding:.8rem 1.2rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;position:relative;}
.chat-item:hover{background:var(--hover);}
.chat-item.active{background:var(--accent2);}
.ci-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;position:relative;}
.ci-avatar.online::after{content:'';position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--sidebar);}
.ci-meta{flex:1;min-width:0;}
.ci-name{font-weight:600;font-size:.88rem;margin-bottom:.2rem;}
.ci-preview{font-size:.76rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0;}
.ci-time{font-size:.68rem;color:var(--sub);}
.ci-badge{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .5rem;border-radius:10px;min-width:20px;text-align:center;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-header{background:var(--sidebar);padding:.85rem 1.4rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.ch-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.ch-name{font-weight:700;font-size:.95rem;}
.ch-status{font-size:.73rem;color:var(--green);margin-top:.1rem;}
.ch-actions{margin-left:auto;display:flex;gap:.3rem;}
.ch-btn{background:none;border:none;cursor:pointer;color:var(--sub);padding:.45rem .55rem;border-radius:8px;transition:all .2s;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.ch-btn:hover{color:var(--accent);background:var(--hover);}
.ch-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:1.2rem 1.5rem;display:flex;flex-direction:column;gap:.6rem;background:var(--bg);background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.date-div{text-align:center;margin:.8rem 0;}
.date-div span{background:rgba(0,0,0,.4);backdrop-filter:blur(8px);font-size:.7rem;color:var(--sub);padding:.3rem 1rem;border-radius:12px;}
.msg{display:flex;gap:.6rem;max-width:75%;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;align-self:flex-end;background:#2B3A4A;}
.bubble{background:var(--bubble-in);border-radius:var(--radius) var(--radius) var(--radius) 2px;padding:.7rem 1rem .5rem;max-width:100%;}
.msg.me .bubble{background:var(--bubble-me);border-radius:var(--radius) var(--radius) 2px var(--radius);}
.btext{font-size:.87rem;line-height:1.6;word-wrap:break-word;}
.bmeta{display:flex;align-items:center;gap:.3rem;justify-content:flex-end;margin-top:.35rem;}
.btime{font-size:.63rem;color:var(--sub);}
.btick{font-size:.68rem;color:var(--accent);}

/* CARDS */
.cards-row{display:flex;flex-wrap:wrap;gap:.8rem;max-width:100%;align-self:flex-start;margin-left:2.4rem;}
.card-msg{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;width:195px;flex-shrink:0;}
.card-msg:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(42,171,238,.15);}
.cm-thumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.cm-body{padding:.85rem;}
.cm-cat{font-size:.62rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem;}
.cm-title{font-size:.86rem;font-weight:700;margin-bottom:.3rem;color:var(--text);}
.cm-desc{font-size:.74rem;color:var(--sub);line-height:1.5;margin-bottom:.5rem;}
.cm-tags{display:flex;gap:.3rem;flex-wrap:wrap;}
.cm-tag{background:rgba(42,171,238,.12);border:1px solid rgba(42,171,238,.2);color:var(--accent);padding:.15rem .5rem;border-radius:10px;font-size:.65rem;font-weight:500;}
.cm-cta{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.7rem;padding:.5rem;background:rgba(42,171,238,.12);border-radius:8px;color:var(--accent);font-size:.75rem;font-weight:600;transition:background .2s;}
.card-msg:hover .cm-cta{background:rgba(42,171,238,.25);}

/* PILLS */
.pills-row{display:flex;flex-wrap:wrap;gap:.4rem;padding:.3rem 0;}
.pill{background:rgba(42,171,238,.12);border:1px solid rgba(42,171,238,.25);color:var(--accent);border-radius:20px;padding:.3rem .8rem;font-size:.74rem;font-weight:500;}

/* LINKS */
.links-col{display:flex;flex-direction:column;gap:.5rem;min-width:200px;}
.link-btn{display:flex;align-items:center;gap:.75rem;background:rgba(42,171,238,.08);border:1px solid rgba(42,171,238,.2);border-radius:10px;padding:.6rem 1rem;text-decoration:none;color:var(--text);font-size:.84rem;font-weight:500;transition:all .2s;cursor:pointer;}
.link-btn:hover{background:rgba(42,171,238,.2);border-color:var(--accent);color:var(--accent);}
.link-btn .li{font-size:1.1rem;flex-shrink:0;}
.link-btn .lt{flex:1;}
.link-btn .arr{color:var(--sub);font-size:.8rem;transition:transform .2s;}
.link-btn:hover .arr{transform:translateX(3px);color:var(--accent);}

/* CONTACT FORM */
.contact-form-bubble{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.2rem;width:100%;max-width:460px;}
.cf-title{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem;}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem;}
.cf-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;color:var(--text);font-size:.82rem;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
.cf-input:focus{border-color:var(--accent);}
.cf-input::placeholder{color:var(--sub);}
textarea.cf-input{resize:vertical;min-height:80px;margin-bottom:.6rem;}
.cf-send{width:100%;background:var(--accent);border:none;border-radius:8px;padding:.65rem;color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.cf-send:hover{background:var(--accent2);}
.cf-send:active{transform:scale(.98);}

/* SUGGESTIONS */
.suggestions{padding:.6rem 1.4rem .4rem;display:flex;gap:.5rem;flex-wrap:wrap;background:var(--sidebar);border-top:1px solid var(--border);}
.sugg-btn{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:.4rem 1rem;font-size:.78rem;color:var(--sub);cursor:pointer;transition:all .18s;white-space:nowrap;font-family:'Inter',sans-serif;}
.sugg-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* INPUT BAR */
.input-bar{background:var(--sidebar);border-top:1px solid var(--border);padding:.8rem 1.2rem;display:flex;align-items:center;gap:.7rem;flex-shrink:0;}
.input-bar input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:.65rem 1.1rem;color:var(--text);font-size:.87rem;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
.input-bar input:focus{border-color:var(--accent);}
.input-bar input::placeholder{color:var(--sub);}
.btn-attach{width:36px;height:36px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--sub);font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s;}
.btn-attach:hover{color:var(--accent);background:var(--hover);}
.btn-send{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s;flex-shrink:0;}
.btn-send:hover{background:var(--accent2);}
.btn-send:active{transform:scale(.9);}
.btn-send svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.2;}

/* WELCOME */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);gap:1rem;text-align:center;padding:2rem;}
.welcome .wicon{font-size:4rem;}
.welcome h2{color:var(--text);font-size:1.2rem;font-weight:600;}
.welcome p{font-size:.85rem;max-width:280px;line-height:1.65;}

/* BACK BTN mobile */
.back-btn{display:none;background:none;border:none;cursor:pointer;color:var(--sub);font-size:1.3rem;padding:.3rem .5rem;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

@media(max-width:640px){
  .sidebar{width:100%;position:fixed;inset:0;z-index:10;display:none;}
  .sidebar.show{display:flex;}
  .back-btn{display:block;}
  .messages-area{padding:.8rem 1rem;}
  .cards-row{margin-left:0;}
}
</style>
</head>

let activeId=null;

function renderSidebar(filter=''){
  const list=document.getElementById('chatList');
  const filtered=CHATS.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase())||c.preview.toLowerCase().includes(filter.toLowerCase()));
  list.innerHTML=filtered.map(c=>`
    <div class="chat-item${activeId===c.id?' active':''}" onclick="openChat('${c.id}')">
      <div class="ci-avatar${c.online?' online':''}" style="background:${c.color};">${c.emoji}</div>
      <div class="ci-meta">
        <div class="ci-name">${c.name}</div>
        <div class="ci-preview">${c.preview}</div>
      </div>
      <div class="ci-right">
        ${c.time?`<span class="ci-time">${c.time}</span>`:''}
        ${c.badge?`<span class="ci-badge">${c.badge}</span>`:''}
      </div>
    </div>`).join('');
}

function filterChats(v){renderSidebar(v);}

function openChat(id){
  activeId=id;
  renderSidebar(document.getElementById('searchInput').value);
  const chat=CHATS.find(c=>c.id===id);
  const msgs=CONTENT[id]||[];
  if(window.innerWidth<=640) document.getElementById('sidebar').classList.remove('show');

  // suggestions par section
  const suggMap={
    home:`<button class="sugg-btn" onclick="openChat('about')">👤 À propos</button><button class="sugg-btn" onclick="openChat('projects')">💼 Projets</button><button class="sugg-btn" onclick="openChat('services')">🛠️ Services</button><button class="sugg-btn" onclick="openChat('contact')">✉️ Contact</button>`,
    about:`<button class="sugg-btn" onclick="openChat('projects')">💼 Voir mes projets</button><button class="sugg-btn" onclick="openChat('contact')">✉️ Me contacter</button>`,
    projects:`<button class="sugg-btn" onclick="openChat('contact')">🚀 Démarrer un projet</button><button class="sugg-btn" onclick="openChat('services')">🛠️ Voir les services</button>`,
    skills:`<button class="sugg-btn" onclick="openChat('projects')">💼 Voir mes projets</button><button class="sugg-btn" onclick="openChat('contact')">✉️ Me contacter</button>`,
    services:`<button class="sugg-btn" onclick="openChat('contact')">📩 Demander un devis</button><button class="sugg-btn" onclick="openChat('projects')">💼 Voir mes projets</button>`,
    contact:`<button class="sugg-btn" onclick="quickSend('Bonjour ! J\\'ai un projet à vous proposer.')">🚀 J'ai un projet</button><button class="sugg-btn" onclick="quickSend('Quels sont vos tarifs ?')">💰 Tarifs</button><button class="sugg-btn" onclick="quickSend('Pouvez-vous m\\'envoyer votre CV ?')">📄 CV</button>`
  };

  document.getElementById('main').innerHTML=`
    <div class="chat-header">
      <button class="back-btn" onclick="showSidebar()">←</button>
      <div class="ch-avatar" style="background:${chat.color};">${chat.emoji}</div>
      <div style="flex:1;">
        <div class="ch-name">${chat.name}</div>
        <div class="ch-status">${chat.status}</div>
      </div>
      <div class="ch-actions">
        <button class="ch-btn" title="Appel WhatsApp" onclick="window.open('https://wa.me/237681061196','_blank')">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.09 9a2 2 0 012-2.18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L9.91 14a16 16 0 006.06 6.06l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        </button>
        <button class="ch-btn" title="Envoyer un email" onclick="window.open('mailto:tamobryan37@gmail.com','_blank')">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </button>
        <button class="ch-btn" title="GitHub" onclick="window.open('https://github.com/tamobryan37-blip/portfolio','_blank')">
          <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        </button>
      </div>
    </div>
    <div class="messages-area" id="msgsArea">
      <div class="date-div"><span>Aujourd'hui</span></div>
      ${msgs.map(renderMsg).join('')}
    </div>
    <div class="suggestions">${suggMap[id]||''}</div>
    <div class="input-bar">
      <input type="file" id="fileInput" style="display:none;" accept="image/*,.pdf,.doc,.docx" onchange="handleFile(this)"/>
      <button class="btn-attach" title="Joindre un fichier" onclick="document.getElementById('fileInput').click()">📎</button>
      <input id="msgInput" type="text" placeholder="Écrire un message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn-send" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      </button>
    </div>`;
  const area=document.getElementById('msgsArea');
  if(area) area.scrollTop=area.scrollHeight;
}

function renderMsg(m){
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  if(m.type==='cards'){
    return `<div class="cards-row">${m.cards.map(card=>`
      <div class="card-msg" onclick="openChat('contact')">
        <div class="cm-thumb" style="background:${card.bg};">${card.emoji}</div>
        <div class="cm-body">
          <div class="cm-cat">${card.cat}</div>
          <div class="cm-title">${card.title}</div>
          <div class="cm-desc">${card.desc}</div>
          ${card.tags?`<div class="cm-tags">${card.tags.map(t=>`<span class="cm-tag">${t}</span>`).join('')}</div>`:''}
          <div class="cm-cta">✉️ Me contacter →</div>
        </div>
      </div>`).join('')}</div>`;
  }

  if(m.type==='pills'){
    return `<div class="msg" style="align-self:flex-start;max-width:88%;">
      <div class="msg-av">🤖</div>
      <div class="bubble">
        <div class="btext">${m.text}</div>
        <div class="pills-row">${m.pills.map(p=>`<span class="pill">${p}</span>`).join('')}</div>
        <div class="bmeta"><span class="btime">${t}</span></div>
      </div></div>`;
  }

  if(m.type==='links'){
    return `<div class="msg" style="align-self:flex-start;max-width:88%;">
      <div class="msg-av">🤖</div>
      <div class="bubble">
        <div class="links-col">${m.links.map(l=>`
          <a href="${l.url}" target="_blank" class="link-btn">
            <span class="li">${l.icon}</span>
            <span class="lt"><b>${l.label}</b><br/><span style="font-size:.72rem;color:var(--sub);">${l.sub}</span></span>
            <span class="arr">→</span>
          </a>`).join('')}
        </div>
        <div class="bmeta"><span class="btime">${t}</span></div>
      </div></div>`;
  }

  if(m.type==='action'){
    return `<div style="align-self:flex-start;margin-left:2.4rem;margin-top:.2rem;">
      <button onclick="openChat('${m.action}')" style="background:var(--accent);border:none;border-radius:10px;padding:.6rem 1.3rem;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;" onmouseover="this.style.background='#1E96D8'" onmouseout="this.style.background='var(--accent)'">${m.label} →</button>
    </div>`;
  }

  if(m.type==='form'){
    return `<div class="msg" style="align-self:flex-start;max-width:95%;">
      <div class="msg-av">🤖</div>
      <div class="bubble" style="padding:.8rem;">
        <div class="contact-form-bubble">
          <div class="cf-title">📬 Envoie-moi un message direct</div>
          <div class="cf-row">
            <input class="cf-input" id="cf-nom" type="text" placeholder="Votre nom"/>
            <input class="cf-input" id="cf-email" type="email" placeholder="Votre email"/>
          </div>
          <input class="cf-input" id="cf-sujet" type="text" placeholder="Sujet du message" style="width:100%;margin-bottom:.6rem;"/>
          <textarea class="cf-input" id="cf-msg" placeholder="Décrivez votre projet ou votre demande..."></textarea>
          <button class="cf-send" onclick="submitForm()">📩 Envoyer le message</button>
        </div>
        <div class="bmeta"><span class="btime">${t}</span></div>
      </div></div>`;
  }

  const isMe=m.from==='me';
  return `<div class="msg${isMe?' me':''}">
    ${!isMe?`<div class="msg-av">🤖</div>`:''}
    <div class="bubble">
      <div class="btext">${m.text}</div>
      <div class="bmeta"><span class="btime">${t}</span>${isMe?`<span class="btick">✓✓</span>`:''}</div>
    </div></div>`;
}

function sendMsg(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  const area=document.getElementById('msgsArea');
  if(!area) return;
  appendMsg(renderMsg({from:'me',text}),area);
  setTimeout(()=>{
    const r=['Merci pour votre message ! 😊 Je vous reviens rapidement.','Message bien reçu ✅ Je vous contacte bientôt !','Super ! Je prends note et vous réponds dans les plus brefs délais 📬','Merci ! N\'hésitez pas à me donner plus de détails 🙏'][Math.floor(Math.random()*4)];
    appendMsg(renderMsg({from:'them',text:r}),area);
  },900);
}

function submitForm(){
  const nom=document.getElementById('cf-nom')?.value.trim();
  const email=document.getElementById('cf-email')?.value.trim();
  const msg=document.getElementById('cf-msg')?.value.trim();
  if(!nom||!email||!msg){
    alert('Merci de remplir au moins votre nom, email et message !');return;
  }
  const area=document.getElementById('msgsArea');
  appendMsg(renderMsg({from:'me',text:`📩 <b>${nom}</b> (${email}) — ${msg}`}),area);
  setTimeout(()=>{
    appendMsg(renderMsg({from:'them',text:`Merci <b>${nom}</b> ! ✅ J'ai bien reçu votre message. Je vous contacte sur <b>${email}</b> dans les prochaines heures. À très bientôt ! 🚀`}),area);
  },1000);
  ['cf-nom','cf-email','cf-sujet','cf-msg'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function quickSend(text){
  const input=document.getElementById('msgInput');
  if(input){input.value=text;sendMsg();}
}

function appendMsg(html,area){
  const el=document.createElement('div');
  el.innerHTML=html;
  if(el.firstElementChild){area.appendChild(el.firstElementChild);area.scrollTop=area.scrollHeight;}
}

function handleFile(input){
  const file=input.files[0];
  if(!file) return;
  const area=document.getElementById('msgsArea');
  if(!area) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const now=new Date();
    const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const isImg=file.type.startsWith('image/');
    const html=isImg
      ?`<div class="msg me"><div class="bubble"><img src="${e.target.result}" style="max-width:220px;max-height:180px;border-radius:8px;display:block;"/><div class="bmeta"><span class="btime">${t}</span><span class="btick">✓✓</span></div></div></div>`
      :`<div class="msg me"><div class="bubble"><div class="btext">📎 <b>${file.name}</b><br/><span style="font-size:.72rem;color:var(--sub);">${(file.size/1024).toFixed(1)} Ko</span></div><div class="bmeta"><span class="btime">${t}</span><span class="btick">✓✓</span></div></div></div>`;
    appendMsg(html,area);
    input.value='';
    setTimeout(()=>appendMsg(renderMsg({from:'them',text:'Fichier reçu ! ✅ Je le consulte et reviens vers toi rapidement 📬'}),area),800);
  };
  reader.readAsDataURL(file);
}

function showSidebar(){document.getElementById('sidebar').classList.toggle('show');}

renderSidebar();
openChat('home');
</script>
</body>
</html>
