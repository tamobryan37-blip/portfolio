<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio — Fred Bryan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:        #17212B;
  --sidebar:   #0E1621;
  --panel:     #1C2733;
  --hover:     #2B3A4A;
  --accent:    #2AABEE;
  --accent2:   #1E96D8;
  --text:      #FFFFFF;
  --sub:       #708EA4;
  --border:    #232F3D;
  --bubble-me: #2B5278;
  --bubble-in: #182533;
  --green:     #4DCD5E;
  --radius:    12px;
}

html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;width:100vw;}

/* ── SIDEBAR ── */
.sidebar{
  width:340px;min-width:260px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  flex-shrink:0;
}
.sidebar-header{
  padding:1rem 1.2rem;
  display:flex;align-items:center;gap:.8rem;
  border-bottom:1px solid var(--border);
}
.sidebar-header .avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#2AABEE,#1A6FA8);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.95rem;color:#fff;flex-shrink:0;
}
.sidebar-header .name{font-weight:600;font-size:.95rem;}
.sidebar-header .handle{font-size:.75rem;color:var(--sub);}
.sidebar-search{
  margin:.8rem 1rem;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;
  padding:.55rem 1rem .55rem 2.4rem;
  color:var(--sub);font-size:.85rem;
  position:relative;
}
.search-wrap{position:relative;margin:.6rem 1rem;}
.search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--sub);}
.search-wrap input{
  width:100%;background:var(--panel);
  border:1px solid var(--border);border-radius:22px;
  padding:.5rem .9rem .5rem 2.2rem;
  color:var(--sub);font-size:.82rem;outline:none;
}
.search-wrap input::placeholder{color:var(--sub);}

.chat-list{flex:1;overflow-y:auto;}
.chat-item{
  display:flex;align-items:center;gap:.9rem;
  padding:.75rem 1.2rem;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .15s;position:relative;
}
.chat-item:hover{background:var(--hover);}
.chat-item.active{background:var(--accent2) !important;}
.chat-item .ci-avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
  position:relative;
}
.ci-avatar.online::after{
  content:'';position:absolute;bottom:2px;right:2px;
  width:10px;height:10px;border-radius:50%;
  background:var(--green);border:2px solid var(--sidebar);
}
.ci-meta{flex:1;min-width:0;}
.ci-meta .ci-name{font-weight:500;font-size:.88rem;margin-bottom:.2rem;}
.ci-meta .ci-preview{font-size:.78rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0;}
.ci-time{font-size:.7rem;color:var(--sub);}
.ci-badge{
  background:var(--accent);color:#fff;
  font-size:.65rem;font-weight:600;
  padding:.15rem .45rem;border-radius:10px;
  min-width:18px;text-align:center;
}

/* ── MAIN PANEL ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}

/* Chat header */
.chat-header{
  background:var(--sidebar);
  padding:.85rem 1.2rem;
  display:flex;align-items:center;gap:1rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.chat-header .ch-avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.ch-info .ch-name{font-weight:600;font-size:.95rem;}
.ch-info .ch-status{font-size:.75rem;color:var(--green);}
.ch-actions{margin-left:auto;display:flex;gap:.5rem;}
.ch-actions button{
  background:none;border:none;cursor:pointer;
  color:var(--sub);padding:.4rem;border-radius:8px;
  transition:color .2s,background .2s;font-size:1.1rem;
}
.ch-actions button:hover{color:var(--accent);background:var(--hover);}

/* Messages area */
.messages-area{
  flex:1;overflow-y:auto;
  padding:1.2rem 2rem;
  display:flex;flex-direction:column;gap:.5rem;
  background:var(--bg);
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.date-divider{
  text-align:center;margin:.8rem 0;
}
.date-divider span{
  background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
  font-size:.72rem;color:var(--sub);
  padding:.3rem .9rem;border-radius:12px;
}
.msg{display:flex;gap:.6rem;max-width:72%;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg .msg-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;flex-shrink:0;align-self:flex-end;
}
.bubble{
  background:var(--bubble-in);
  border-radius:var(--radius) var(--radius) var(--radius) 2px;
  padding:.65rem .9rem .5rem;
  position:relative;max-width:100%;
}
.msg.me .bubble{
  background:var(--bubble-me);
  border-radius:var(--radius) var(--radius) 2px var(--radius);
}
.bubble .btext{font-size:.88rem;line-height:1.55;word-wrap:break-word;}
.bubble .bmeta{
  display:flex;align-items:center;gap:.3rem;
  justify-content:flex-end;margin-top:.3rem;
}
.bubble .btime{font-size:.65rem;color:var(--sub);}
.bubble .btick{font-size:.7rem;color:var(--accent);}

/* Card message */
.card-msg{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:border-color .2s,transform .15s;min-width:220px;
}
.card-msg:hover{border-color:var(--accent);transform:translateY(-2px);}
.card-msg .cm-thumb{
  height:110px;display:flex;align-items:center;
  justify-content:center;font-size:2.8rem;
}
.card-msg .cm-body{padding:.8rem;}
.card-msg .cm-cat{font-size:.65rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;}
.card-msg .cm-title{font-size:.88rem;font-weight:600;margin-bottom:.3rem;}
.card-msg .cm-desc{font-size:.76rem;color:var(--sub);line-height:1.5;}

/* Skill pills bubble */
.pills-bubble{display:flex;flex-wrap:wrap;gap:.4rem;padding:.2rem 0;}
.pill{
  background:rgba(42,171,238,.15);
  border:1px solid rgba(42,171,238,.3);
  color:var(--accent);border-radius:20px;
  padding:.3rem .8rem;font-size:.75rem;font-weight:500;
}

/* Input bar */
.input-bar{
  background:var(--sidebar);
  border-top:1px solid var(--border);
  padding:.8rem 1.2rem;
  display:flex;align-items:center;gap:.7rem;
  flex-shrink:0;
}
.input-bar input{
  flex:1;background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;padding:.65rem 1.1rem;
  color:var(--text);font-size:.88rem;outline:none;
  transition:border-color .2s;
}
.input-bar input:focus{border-color:var(--accent);}
.input-bar input::placeholder{color:var(--sub);}
.btn-send{
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .1s;flex-shrink:0;
}
.btn-send:hover{background:var(--accent2);}
.btn-send:active{transform:scale(.9);}
.btn-send svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;}
.btn-attach{
  width:36px;height:36px;border-radius:50%;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--sub);transition:color .2s;font-size:1.3rem;
}
.btn-attach:hover{color:var(--accent);}

/* Suggestions (quick reply) */
.suggestions{
  padding:.5rem 1.2rem .2rem;
  display:flex;gap:.5rem;flex-wrap:wrap;
  background:var(--sidebar);
  border-top:1px solid var(--border);
}
.sugg-btn{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;padding:.4rem 1rem;
  font-size:.78rem;color:var(--sub);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.sugg-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--sub);gap:1rem;text-align:center;
  padding:2rem;
}
.welcome .wicon{font-size:4rem;margin-bottom:.5rem;}
.welcome h2{color:var(--text);font-size:1.2rem;font-weight:500;}
.welcome p{font-size:.85rem;max-width:280px;line-height:1.6;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* Mobile */
@media(max-width:640px){
  .sidebar{width:100%;display:none;}
  .sidebar.mobile-show{display:flex;position:fixed;inset:0;z-index:10;width:100%;}
  .main{width:100%;}
  .back-btn{display:flex!important;}
  .messages-area{padding:.8rem 1rem;}
}
.back-btn{
  display:none;background:none;border:none;cursor:pointer;
  color:var(--sub);font-size:1.2rem;padding:.3rem;
}
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="avatar">FB</div>
      <div>
        <div class="name">Fred Bryan</div>
        <div class="handle">@fredbryan_dev</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Rechercher..."/>
    </div>
    <div class="chat-list" id="chatList">
      <!-- injected by JS -->

  <!-- ── MAIN ── -->
  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <div class="wicon">👋</div>
      <h2>Bienvenue sur mon portfolio</h2>
      <p>Sélectionne une section dans la liste pour découvrir mon travail, mes compétences et me contacter.</p>

</div>

<script>
const CHATS = [

    messages:[]
  },
  {
    id:'projects',
    emoji:'💼',
    name:'Mes Projets',
    preview:'6 projets récents disponibles',
    time:'',

  },
  {

  },

    online:true,

const CONTENT = {
  home:[
    {from:'them',text:'👋 Bonjour ! Je suis <b>Fred Bryan</b>, développeur web & designer basé à Douala, Cameroun.'},
    {from:'them',text:'Je crée des expériences digitales modernes — sites web, applications et interfaces qui allient esthétique et performance.'},
    {from:'them',text:'✨ <b>Ce portfolio est organisé comme une messagerie.</b> Clique sur une section à gauche pour en savoir plus sur moi, mes projets ou me contacter directement !'},
    {from:'them',text:'👉 Par où veux-tu commencer ?'},
  ],
  about:[
    {from:'them',text:'Je m\'appelle <b>Fred Bryan</b>, j\'ai 26 ans et je suis passionné par le code depuis mes 16 ans.'},
    {from:'them',text:'🎓 Diplômé en Informatique à l\'Université de Douala — option Génie Logiciel.'},
    {from:'them',text:'💡 J\'aime résoudre des problèmes complexes avec des solutions simples et élégantes. Chaque projet est une occasion d\'apprendre quelque chose de nouveau.'},
    {from:'them',text:'🌍 Je travaille en remote avec des clients en Afrique, en Europe et en Amérique.'},
    {from:'them',text:'En dehors du code, je joue de la guitare 🎸 et je fais de la photo urbaine 📷'},

  projects:[

    {from:'them',type:'cards',cards:[
      {emoji:'🛒',bg:'#1A3A5C',cat:'E-commerce',title:'Boutique en ligne',desc:'Plateforme complète avec panier & paiement Stripe.',tags:['React','Node.js','Stripe']},
      {emoji:'📱',bg:'#3A1A4A',cat:'Mobile',title:'App de tâches',desc:'Gestion de projets avec synchronisation cloud.',tags:['React Native','Firebase']},
      {emoji:'🌿',bg:'#1A3A2A',cat:'Site vitrine',title:'Restaurant Chez Marie',desc:'Site avec menu en ligne et réservation.',tags:['HTML','CSS','JS']},
    ]},
    {from:'them',type:'cards',cards:[
      {emoji:'📊',bg:'#3A2A1A',cat:'Dashboard',title:'Analytics Board',desc:'Visualisation de données en temps réel.',tags:['React','Chart.js']},
      {emoji:'🎨',bg:'#2A1A3A',cat:'UI/UX Design',title:'Refonte SaaS',desc:'Modernisation UX avec tests utilisateurs.',tags:['Figma','Prototypage']},
      {emoji:'🤖',bg:'#1A2A3A',cat:'IA',title:'Chatbot service client',desc:'Assistant virtuel NLP pour FAQ automatisées.',tags:['Python','NLP']},
    ]},
  ],
  skills:[
    {from:'them',text:'🛠️ Voici mon stack technique complet :'},
    {from:'them',text:'<b>Frontend</b>',type:'pills',pills:['HTML5','CSS3','JavaScript','TypeScript','React','Vue.js','Tailwind CSS']},
    {from:'them',text:'<b>Backend</b>',type:'pills',pills:['Node.js','Express','Python','Django','REST API','GraphQL']},
    {from:'them',text:'<b>Outils & DevOps</b>',type:'pills',pills:['Git','GitHub','Docker','VS Code','Figma','Postman','Firebase']},
    {from:'them',text:'<b>Bases de données</b>',type:'pills',pills:['MongoDB','PostgreSQL','MySQL','Redis']},
    {from:'them',text:'Je me forme en continu 📚 — en ce moment j\'explore <b>Next.js 14</b> et l\'<b>IA générative</b>.'},
  ],
  services:[
    {from:'them',text:'💼 Ce que je peux faire pour vous :'},
    {from:'them',type:'cards',cards:[
      {emoji:'🖥️',bg:'#1A2A3A',cat:'Développement',title:'Sites & Applications Web',desc:'De la landing page au SaaS complet — rapide, responsive, optimisé.'},
      {emoji:'🎨',bg:'#2A1A3A',cat:'Design',title:'UI/UX Design',desc:'Maquettes Figma, prototypes interactifs, design system.'},
      {emoji:'📱',bg:'#1A3A2A',cat:'Mobile',title:'Applications Mobiles',desc:'iOS & Android avec React Native — une codebase, deux plateformes.'},
      {emoji:'⚡',bg:'#3A2A1A',cat:'Optimisation',title:'Perf & SEO',desc:'Audit et amélioration : vitesse, SEO, accessibilité, sécurité.'},
    ]},
    {from:'them',text:'💰 Tarifs à partir de <b>50 000 XAF</b> selon la complexité du projet. Devis gratuit en 24h !'},
  ],
  contact:[
    {from:'them',text:'✉️ Tu peux me contacter directement ici, ou via ces plateformes :'},
    {from:'them',type:'links',links:[
      {icon:'💼',label:'LinkedIn',url:'#'},
      {icon:'🐙',label:'GitHub',url:'#'},
      {icon:'✉️',label:'Email',url:'mailto:fred@exemple.com'},
      {icon:'💬',label:'WhatsApp',url:'#'},
    ]},
    {from:'them',text:'📍 Douala, Cameroun · 🌍 Remote OK'},
    {from:'them',text:'⏰ Disponible du lundi au vendredi, 8h–18h (WAT). Je réponds généralement en moins de 3 heures.'},
    {from:'them',text:'Laisse-moi un message ci-dessous et je te reviens rapidement ! 👇'},
  ]
};

let activeId = null;

function renderSidebar(){
  const list = document.getElementById('chatList');
  list.innerHTML = CHATS.map(c=>`
    <div class="chat-item${c.online?' ':''}${activeId===c.id?' active':''}" onclick="openChat('${c.id}')">
      <div class="ci-avatar${c.online?' online':''}" style="background:${c.color};">${c.emoji}</div>
      <div class="ci-meta">
        <div class="ci-name">${c.name}</div>
        <div class="ci-preview">${c.preview}</div>
      </div>
      <div class="ci-right">
        ${c.time?`<span class="ci-time">${c.time}</span>`:''}
        ${c.badge?`<span class="ci-badge">${c.badge}</span>`:''}
      </div>
    </div>
  `).join('');
}

function openChat(id){
  activeId = id;
  renderSidebar();
  const chat = CHATS.find(c=>c.id===id);
  const msgs = CONTENT[id]||[];

  // Mobile: hide sidebar
  if(window.innerWidth<=640){
    document.getElementById('sidebar').classList.remove('mobile-show');
  }

  document.getElementById('main').innerHTML = `
    <div class="chat-header">
      <button class="back-btn" onclick="showSidebar()">←</button>
      <div class="ch-avatar" style="background:${chat.color};">${chat.emoji}</div>
      <div class="ch-info">
        <div class="ch-name">${chat.name}</div>
        <div class="ch-status">${chat.status}</div>
      </div>
      <div class="ch-actions">
        <button title="Rechercher">🔍</button>
        <button title="Appel">📞</button>
        <button title="Plus">⋮</button>
      </div>
    </div>
    <div class="messages-area" id="msgsArea">
      <div class="date-divider"><span>Aujourd'hui</span></div>
      ${msgs.map(renderMsg).join('')}
    </div>
    ${id==='contact'?`
    <div class="suggestions" id="suggs">
      <button class="sugg-btn" onclick="quickSend('Bonjour ! J\\'ai un projet à vous proposer.')">🚀 J'ai un projet</button>
      <button class="sugg-btn" onclick="quickSend('Quels sont vos tarifs ?')">💰 Voir les tarifs</button>
      <button class="sugg-btn" onclick="quickSend('Pouvez-vous m\\'envoyer votre CV ?')">📄 Voir le CV</button>
    </div>`:
    id==='home'?`
    <div class="suggestions" id="suggs">
      <button class="sugg-btn" onclick="openChat('about')">👤 À propos</button>
      <button class="sugg-btn" onclick="openChat('projects')">💼 Projets</button>
      <button class="sugg-btn" onclick="openChat('contact')">✉️ Contact</button>
    </div>`:''}
    <div class="input-bar">
      <button class="btn-attach" title="Joindre">📎</button>
      <input id="msgInput" type="text" placeholder="Écrire un message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn-send" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      </button>
    </div>
  `;
  // scroll to bottom
  const area = document.getElementById('msgsArea');
  if(area) area.scrollTop = area.scrollHeight;
}

function renderMsg(m){
  if(m.type==='cards'){
    return `<div class="msg" style="max-width:95%;align-self:flex-start;flex-wrap:wrap;gap:.7rem;">
      ${m.cards.map(card=>`
        <div class="card-msg" onclick="void(0)" style="width:200px;">
          <div class="cm-thumb" style="background:${card.bg};">${card.emoji}</div>
          <div class="cm-body">
            <div class="cm-cat">${card.cat}</div>
            <div class="cm-title">${card.title}</div>
            <div class="cm-desc">${card.desc}</div>
            ${card.tags?`<div style="display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.5rem;">${card.tags.map(t=>`<span class="pill" style="font-size:.65rem;padding:.15rem .5rem;">${t}</span>`).join('')}</div>`:''}
          </div>
        </div>
      `).join('')}
    </div>`;
  }
  if(m.type==='pills'){
    return `<div class="msg" style="align-self:flex-start;max-width:85%;">
      <div class="msg-av" style="background:#2B3A4A;">🤖</div>
      <div class="bubble">
        <div class="btext">${m.text}</div>
        <div class="pills-bubble">${m.pills.map(p=>`<span class="pill">${p}</span>`).join('')}</div>
        <div class="bmeta"><span class="btime">maintenant</span></div>
      </div>
    </div>`;
  }
  if(m.type==='links'){
    return `<div class="msg" style="align-self:flex-start;max-width:85%;">
      <div class="msg-av" style="background:#2B3A4A;">🤖</div>
      <div class="bubble">
        <div style="display:flex;flex-direction:column;gap:.5rem;min-width:180px;">
          ${m.links.map(l=>`
            <a href="${l.url}" style="display:flex;align-items:center;gap:.7rem;background:rgba(42,171,238,.12);border:1px solid rgba(42,171,238,.25);border-radius:8px;padding:.5rem .8rem;text-decoration:none;color:var(--accent);font-size:.82rem;transition:background .15s;" onmouseover="this.style.background='rgba(42,171,238,.25)'" onmouseout="this.style.background='rgba(42,171,238,.12)'">${l.icon} ${l.label}</a>
          `).join('')}
        </div>
        <div class="bmeta"><span class="btime">maintenant</span></div>
      </div>
    </div>`;
  }
  const isMe = m.from==='me';
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  return `<div class="msg${isMe?' me':''}">
    ${!isMe?`<div class="msg-av" style="background:#2B3A4A;">🤖</div>`:''}
    <div class="bubble">
      <div class="btext">${m.text}</div>
      <div class="bmeta">
        <span class="btime">${t}</span>
        ${isMe?`<span class="btick">✓✓</span>`:''}
      </div>
    </div>
  </div>`;
}

function sendMsg(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  const area = document.getElementById('msgsArea');
  if(!area) return;
  const msgEl = document.createElement('div');
  msgEl.innerHTML = renderMsg({from:'me',text});
  area.appendChild(msgEl.firstElementChild);
  area.scrollTop = area.scrollHeight;
  // auto-reply
  setTimeout(()=>{
    const replies = [
      'Merci pour votre message ! 😊',
      'Je vous reviens dans les plus brefs délais.',
      'Super, votre message a bien été reçu ! ✅',
      'Excellent ! Je prends note et vous contacte bientôt 📬'
    ];
    const r = replies[Math.floor(Math.random()*replies.length)];
    const el2 = document.createElement('div');
    el2.innerHTML = renderMsg({from:'them',text:r});
    area.appendChild(el2.firstElementChild);
    area.scrollTop = area.scrollHeight;
  },900);
}

function quickSend(text){
  const input = document.getElementById('msgInput');
  input.value = text;
  sendMsg();
}

function showSidebar(){
  document.getElementById('sidebar').classList.toggle('mobile-show');
}

// Init
renderSidebar();
// Auto-open home
openChat('home');
</script>
